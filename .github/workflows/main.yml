name: Build Webcamoid

on:
  workflow_dispatch: # Allows you to manually trigger the build

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential qt6-base-dev qt6-declarative-dev libqt6svg6-dev

    - name: Configure CMake
      run: cmake -S . -B build -DNOCHECKUPDATES=ON

    - name: Build Code
      run: cmake --build build --parallel $(nproc)

    - name: Upload Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webcamoid-linux-build
        path: build/
