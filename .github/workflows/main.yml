name: Build Webcamoid

on:
  workflow_dispatch: # Allows you to manually trigger the build

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      # [Correction]: Added Qt6 multimedia, tools, and FFmpeg libraries required by Webcamoid
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential \
        qt6-base-dev qt6-declarative-dev qt6-multimedia-dev qt6-tools-dev libqt6svg6-dev \
        libgl1-mesa-dev libpulse-dev libasound2-dev \
        libavcodec-dev libavformat-dev libavutil-dev libavdevice-dev libswscale-dev

    - name: Configure CMake
      run: cmake -S . -B build -DNOCHECKUPDATES=ON

    - name: Build Code
      # [Correction]: Changed $(nproc) to '2' to prevent GitHub Actions from running out of memory
      run: cmake --build build --parallel 2

    - name: Upload Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: webcamoid-linux-build
        path: build/
